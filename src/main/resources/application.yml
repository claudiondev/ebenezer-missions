server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ebenezer_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Usar 'validate' em produção com Flyway/Liquibase
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

application:
  jwt:
    # Mínimo 32 caracteres (256 bits) para HS256 — troque em produção
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}          # 1 hora em ms
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 dias em ms
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
